<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>아기 심장소리 탐지기 v0.2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e6f0;min-height:100vh}
.c{max-width:420px;margin:0 auto;padding:16px}
.hdr{text-align:center;padding:12px 0 16px}
.hdr h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#ff6b8a,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{font-size:11px;color:#6b6880;margin-top:2px}
.warn{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.15);border-radius:10px;padding:8px 12px;font-size:11px;color:#ff6b6b;line-height:1.5;margin-bottom:12px}
.card{background:#12121a;border:1px solid #1e1e2e;border-radius:16px;padding:20px;text-align:center;margin-bottom:12px}
.heart-wrap{position:relative;width:70px;height:70px;margin:0 auto 10px}
.heart-wrap svg{width:100%;height:100%}
.heart-wrap.beat svg{animation:hb .6s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
.slbl{font-size:17px;font-weight:700}
.ssub{font-size:12px;color:#6b6880;margin-top:4px}
.cbar{margin-top:10px;height:5px;background:#1e1e2e;border-radius:3px;overflow:hidden}
.cfill{height:100%;border-radius:3px;transition:width .5s,background .5s;width:0}
.mets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.met{background:#12121a;border:1px solid #1e1e2e;border-radius:10px;padding:8px 4px;text-align:center}
.mv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.ml{font-size:9px;color:#6b6880;margin-top:2px;text-transform:uppercase}
.viz{background:#12121a;border:1px solid #1e1e2e;border-radius:14px;padding:10px;margin-bottom:10px}
.viz h3{font-size:10px;color:#6b6880;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.bars{height:70px;display:flex;align-items:flex-end;gap:1px}
canvas{width:100%;height:50px}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:4px;color:#fff}
.btn-go{background:linear-gradient(135deg,#ff6b8a,#ff8fa3)}
.btn-stop{background:#1e1e2e}
.btn-diag{background:linear-gradient(135deg,#4ecdc4,#44b3ab);margin-bottom:8px}
.timer{font-size:12px;color:#6b6880;text-align:center;margin-top:4px;font-variant-numeric:tabular-nums}
.freq-sel{display:flex;gap:5px;margin-bottom:10px}
.freq-btn{flex:1;padding:8px 2px;border:1px solid #1e1e2e;border-radius:8px;background:#12121a;color:#6b6880;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.freq-btn.active{border-color:#4ecdc4;color:#4ecdc4;background:rgba(78,205,196,.08)}
.dbg-t{font-size:11px;color:#6b6880;text-align:center;cursor:pointer;padding:6px;user-select:none;margin-top:6px}
.dbg{background:#12121a;border:1px solid #1e1e2e;border-radius:10px;padding:8px;font-size:10px;font-family:monospace;color:#6b6880;line-height:1.5;max-height:180px;overflow-y:auto;margin-bottom:10px;display:none}
.dbg.show{display:block}
.diag-result{background:#12121a;border:1px solid #1e1e2e;border-radius:10px;padding:10px;margin-bottom:10px;display:none}
.diag-result.show{display:block}
.diag-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e1e2e;font-size:12px}
.diag-row:last-child{border:none}
</style>
</head>
<body>
<div class="c">
<div class="hdr"><h1>아기 심장소리 탐지기</h1><p>Active Doppler v0.2</p></div>
<div class="warn">⚠️ 의료기기 아님. 연구/체험 목적 프로토타입.</div>
<button class="btn btn-diag" id="diagBtn" onclick="runDiag()">📡 주파수 진단 (먼저 실행)</button>
<div class="diag-result" id="diagR"><div id="diagRows"></div><div id="diagRec" style="margin-top:6px;font-size:12px;color:#4ecdc4"></div></div>
<div style="font-size:11px;color:#6b6880;margin-bottom:4px">송출 주파수:</div>
<div class="freq-sel">
<button class="freq-btn" onclick="setF(15000)" id="f15">15k</button>
<button class="freq-btn" onclick="setF(16000)" id="f16">16k</button>
<button class="freq-btn" onclick="setF(17000)" id="f17">17k</button>
<button class="freq-btn active" onclick="setF(18000)" id="f18">18k</button>
<button class="freq-btn" onclick="setF(19000)" id="f19">19k</button>
</div>
<div class="card">
<div class="heart-wrap" id="hw"><svg viewBox="0 0 80 80"><path d="M40 68C20 52 4 36 4 24 4 14 12 6 22 6 28 6 34 10 40 18 46 10 52 6 58 6 68 6 76 14 76 24 76 36 60 52 40 68Z" fill="currentColor" id="hp" style="color:#1e1e2e"/></svg></div>
<div class="slbl" id="sl">준비</div>
<div class="ssub" id="ss">먼저 📡 주파수 진단을 실행하세요</div>
<div class="cbar"><div class="cfill" id="cf"></div></div>
</div>
<div class="mets">
<div class="met"><div class="mv" id="m1">—</div><div class="ml">SNR (dB)</div></div>
<div class="met"><div class="mv" id="m2">—</div><div class="ml">주기성</div></div>
<div class="met"><div class="mv" id="m3">—</div><div class="ml">신뢰도</div></div>
</div>
<div class="viz"><h3 id="spL">스펙트럼</h3><div class="bars" id="bars"><div style="width:100%;text-align:center;color:#2a2a3a;font-size:11px;padding-bottom:25px">측정 시작 후 표시</div></div></div>
<div class="viz"><h3>Novelty (심박 이벤트)</h3><canvas id="nc" height="50"></canvas></div>
<button class="btn btn-go" id="btn" onclick="toggle()">측정 시작</button>
<div class="timer" id="tm"></div>
<div class="dbg-t" onclick="document.getElementById('dbg').classList.toggle('show')">디버그 ▾</div>
<div class="dbg show" id="dbg"></div>
</div>
<script>
let ax=null,osc=null,an=null,mst=null,rec=false,t0=0,af=null,ti=null;
let TF=18000,SR=48000,FFT=4096,NL=200;
let nh=new Float32Array(NL),prev=null,fc=0,psc=[],dsc=[];

function lg(m){const d=document.getElementById('dbg');const s=((Date.now()-t0)/1000).toFixed(1);d.innerHTML+=`[${s}s] ${m}<br>`;d.scrollTop=d.scrollHeight}
function setF(f){TF=f;document.querySelectorAll('.freq-btn').forEach(b=>b.classList.remove('active'));
const el=document.getElementById('f'+(f/1000));if(el)el.classList.add('active');
document.getElementById('spL').textContent=`스펙트럼 (${f/1000}kHz)`;}

async function runDiag(){
const btn=document.getElementById('diagBtn');
btn.textContent='진단 중...';btn.disabled=true;
const dr=document.getElementById('diagR');dr.classList.add('show');
document.getElementById('diagRows').innerHTML='<div style="color:#6b6880;font-size:11px">테스트 중... 약 5초</div>';
document.getElementById('diagRec').textContent='';
t0=Date.now();
try{
const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
const ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR});
const mic=ctx.createMediaStreamSource(st);
const anal=ctx.createAnalyser();anal.fftSize=FFT;anal.smoothingTimeConstant=0.1;mic.connect(anal);
const freqs=[14000,15000,16000,17000,18000,19000,20000];
const res=[];
for(const f of freqs){
const o=ctx.createOscillator();o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime);
const g=ctx.createGain();g.gain.setValueAtTime(1.0,ctx.currentTime);
o.connect(g);g.connect(ctx.destination);o.start();
await new Promise(r=>setTimeout(r,500));
const fd=new Float32Array(anal.frequencyBinCount);anal.getFloatFrequencyData(fd);
const br=ctx.sampleRate/FFT;const cb=Math.round(f/br);
let sig=-200;for(let i=cb-3;i<=cb+3;i++)if(i>=0&&i<fd.length&&fd[i]>sig)sig=fd[i];
let ns=0,nc=0;for(let i=Math.max(0,cb-80);i<cb-20;i++){ns+=fd[i];nc++}
const na=nc>0?ns/nc:-100;const snr=sig-na;
res.push({f,sig,na,snr});
lg(`${f/1000}kHz: sig=${sig.toFixed(0)}dB noise=${na.toFixed(0)}dB SNR=${snr.toFixed(1)}dB`);
o.stop();
}
st.getTracks().forEach(t=>t.stop());ctx.close();

let html='';let bestF=18000,bestS=-999;
res.forEach(r=>{
const c=r.snr>20?'#4ecdc4':r.snr>5?'#ffd93d':'#ff6b6b';
const ic=r.snr>20?'🟢':r.snr>5?'🟡':'🔴';
html+=`<div class="diag-row"><span style="font-weight:600">${ic} ${r.f/1000}kHz</span><span style="color:${c};font-variant-numeric:tabular-nums">SNR ${r.snr.toFixed(1)}dB (sig ${r.sig.toFixed(0)})</span></div>`;
if(r.snr>bestS&&r.f>=15000){bestS=r.snr;bestF=r.f}
});
document.getElementById('diagRows').innerHTML=html;
if(bestS>5){
document.getElementById('diagRec').textContent=`✅ 추천: ${bestF/1000}kHz (SNR ${bestS.toFixed(1)}dB)`;
setF(bestF);
}else if(bestS>0){
document.getElementById('diagRec').innerHTML=`⚠️ 신호 약함. ${bestF/1000}kHz가 그나마 나음.<br>볼륨 최대 + 케이스 제거 후 재시도`;
setF(bestF);
}else{
document.getElementById('diagRec').innerHTML='❌ 신호 없음. 볼륨 최대로 올려주세요.';
}
}catch(e){document.getElementById('diagRows').innerHTML=`<div style="color:#ff6b6b">${e.message}</div>`}
btn.textContent='📡 주파수 재진단';btn.disabled=false;
}

function toggle(){rec?stop():start()}

async function start(){
try{
nh=new Float32Array(NL);prev=null;fc=0;psc=[];dsc=[];
document.getElementById('dbg').innerHTML='';t0=Date.now();
mst=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
ax=new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR});
lg('AudioContext: '+ax.sampleRate+'Hz, freq: '+TF/1000+'kHz');
osc=ax.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(TF,ax.currentTime);
const g=ax.createGain();g.gain.setValueAtTime(1.0,ax.currentTime);
osc.connect(g);g.connect(ax.destination);osc.start();
lg(TF/1000+'kHz 톤 발사');
const mic=ax.createMediaStreamSource(mst);
an=ax.createAnalyser();an.fftSize=FFT;an.smoothingTimeConstant=0.2;mic.connect(an);
const br=ax.sampleRate/FFT;
lg('FFT='+FFT+' ('+br.toFixed(1)+'Hz/bin)');
rec=true;ui('rec');let sec=60;
document.getElementById('tm').textContent=sec+'초 남음';
ti=setInterval(()=>{sec--;document.getElementById('tm').textContent=sec+'초 남음';if(sec<=0)stop()},1000);
af=requestAnimationFrame(proc);
}catch(e){lg('에러: '+e.message)}}

function stop(){
rec=false;
if(osc)try{osc.stop()}catch(e){}osc=null;
if(mst)mst.getTracks().forEach(t=>t.stop());
if(ax)ax.close();ax=null;an=null;
if(af)cancelAnimationFrame(af);if(ti)clearInterval(ti);
if(psc.length<3){ui('insuf');return}
const sp=[...psc].sort((a,b)=>a-b),mp=sp[Math.floor(sp.length/2)];
const sd=[...dsc].sort((a,b)=>a-b),ms2=sd[Math.floor(sd.length/2)];
const ps2=Math.min(1,Math.max(0,mp/0.4)),ss=Math.min(1,Math.max(0,(ms2-3)/10));
const conf=ps2*0.7+ss*0.3;
let st='nd';if(conf>0.6)st='det';else if(conf>0.3)st='weak';
lg('최종: '+st+' 신뢰도='+(conf*100).toFixed(0)+'% 주기성='+mp.toFixed(3)+' SNR='+ms2.toFixed(1));
ui(st,conf,mp)}

function proc(){
if(!rec||!an)return;
const fd=new Float32Array(an.frequencyBinCount);an.getFloatFrequencyData(fd);
const br=ax.sampleRate/FFT;
const bw=500;const lo=Math.floor((TF-bw)/br),hi=Math.ceil((TF+bw)/br);
const bd=fd.slice(lo,hi+1);
const dl=Math.max(0,lo-8),dh=Math.min(fd.length,hi+8);
let bh='';for(let i=dl;i<dh;i++){
const v=Math.max(0,(fd[i]+100)/50);const ib=(i>=lo&&i<=hi);
bh+=`<div class="bar" style="height:${Math.min(100,v*100)}%;background:${ib?(v>.5?'rgba(78,205,196,.8)':'rgba(78,205,196,.3)'):'rgba(100,100,120,.15)'}"></div>`}
document.getElementById('bars').innerHTML=bh;
if(prev){let nv=0;for(let i=0;i<bd.length;i++){const d=bd[i]-prev[i];if(d>0)nv+=d}
nh.copyWithin(0,1);nh[NL-1]=nv}
prev=new Float32Array(bd);fc++;
if(fc%3===0){const cv=document.getElementById('nc');const cx=cv.getContext('2d');
const w=cv.width=cv.offsetWidth*2;const h=cv.height=100;
cx.fillStyle='#12121a';cx.fillRect(0,0,w,h);
let mx=.001;for(let i=0;i<NL;i++)if(nh[i]>mx)mx=nh[i];
cx.beginPath();cx.strokeStyle='#ff6b8a';cx.lineWidth=1.5;
for(let i=0;i<NL;i++){const x=(i/NL)*w;const y=h-((nh[i]/mx)*h*.85)-3;
if(!i)cx.moveTo(x,y);else cx.lineTo(x,y)}
cx.stroke();cx.lineTo(w,h);cx.lineTo(0,h);cx.closePath();cx.fillStyle='rgba(255,107,138,.06)';cx.fill()}
if(fc%15===0&&fc>60){
const p=acorr(nh);psc.push(p);
const be=bd.reduce((s,v)=>s+Math.pow(10,v/10),0);
const nr=fd.slice(0,Math.max(1,lo-50));
const nf=nr.reduce((s,v)=>s+Math.pow(10,v/10),0)/(nr.length||1);
const snr=10*Math.log10(be/(nf*bd.length+1e-10));dsc.push(snr);
document.getElementById('m1').textContent=snr.toFixed(1);document.getElementById('m1').style.color=snr>5?'#4ecdc4':snr>0?'#ffd93d':'#6b6880';
document.getElementById('m2').textContent=p.toFixed(3);document.getElementById('m2').style.color=p>.15?'#4ecdc4':p>.05?'#ffd93d':'#6b6880';
const cf=Math.min(100,Math.max(0,(p/.4)*70+((snr-3)/10)*30));
document.getElementById('m3').textContent=cf.toFixed(0)+'%';
const cfl=document.getElementById('cf');cfl.style.width=cf+'%';cfl.style.background=cf>60?'#4ecdc4':cf>30?'#ffd93d':'#ff6b6b';
if(p>.15){document.getElementById('hw').classList.add('beat');document.getElementById('hp').style.color='#ff6b8a'}
else{document.getElementById('hw').classList.remove('beat');document.getElementById('hp').style.color='#1e1e2e'}
if(psc.length%5===0)lg(`SNR=${snr.toFixed(1)} 주기=${p.toFixed(3)} 신뢰=${cf.toFixed(0)}%`)}
af=requestAnimationFrame(proc)}

function acorr(s){const fps=60,mn=Math.floor(fps/2.8),mx2=Math.ceil(fps/1.8),l=s.length;
let m=0;for(let i=0;i<l;i++)m+=s[i];m/=l;
let v=0;for(let i=0;i<l;i++)v+=(s[i]-m)**2;v/=l;if(v<1e-10)return 0;
let mc=-1;for(let lag=mn;lag<=mx2;lag++){let c=0,n=0;
for(let i=0;i<l-lag;i++){c+=(s[i]-m)*(s[i+lag]-m);n++}
c=c/(n*v);if(c>mc)mc=c}return Math.max(0,mc)}

function ui(s,conf,per){const b=document.getElementById('btn'),sl=document.getElementById('sl'),ss=document.getElementById('ss'),hp=document.getElementById('hp'),hw=document.getElementById('hw');
document.getElementById('tm').textContent='';
if(s==='rec'){b.textContent='측정 중지';b.className='btn btn-stop';sl.textContent='측정 중...';sl.style.color='';ss.textContent='가만히 계세요'}
else if(s==='det'){b.textContent='다시 측정';b.className='btn btn-go';sl.textContent='💚 신호 감지됨';sl.style.color='#4ecdc4';ss.textContent='신뢰도 '+(conf*100).toFixed(0)+'%';hp.style.color='#4ecdc4';hw.classList.add('beat');document.getElementById('cf').style.width=(conf*100)+'%';document.getElementById('cf').style.background='#4ecdc4'}
else if(s==='weak'){b.textContent='다시 측정';b.className='btn btn-go';sl.textContent='💛 약한 신호';sl.style.color='#ffd93d';ss.textContent='위치/주파수 변경 후 재시도';hp.style.color='#ffd93d';hw.classList.remove('beat');document.getElementById('cf').style.width=(conf*100)+'%';document.getElementById('cf').style.background='#ffd93d'}
else if(s==='nd'){b.textContent='다시 측정';b.className='btn btn-go';sl.textContent='감지되지 않음';sl.style.color='#6b6880';ss.textContent='주파수 변경 후 재시도';hp.style.color='#1e1e2e';hw.classList.remove('beat');document.getElementById('cf').style.width='0'}
else{b.textContent='다시 측정';b.className='btn btn-go';sl.textContent='데이터 부족';sl.style.color='#6b6880';ss.textContent='60초간 측정해주세요'}}
</script>
</body>
</html>
